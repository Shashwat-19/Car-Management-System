version: "3.9"

services:
  car-management-system:
    build: .
    container_name: car-management-system
    ports:
      - "3000:8000"
    environment:
      - FIREBASE_SERVICE_ACCOUNT=${FIREBASE_SERVICE_ACCOUNT:-}
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
